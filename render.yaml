services:
  - type: web
    name: dreamy-bakery-bot
    env: node
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: PORT
        value: 10000
